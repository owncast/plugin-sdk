<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>File Manager</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 1.5rem;
        color: #1b1b1b;
      }
      h1 {
        margin-top: 0;
      }
      .hint {
        color: #666;
        font-size: 0.9rem;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 1rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #e3e3e3;
      }
      .empty {
        color: #888;
        padding: 1rem 0;
      }
      button {
        cursor: pointer;
      }
      .danger {
        color: #b00020;
      }
      .uploader {
        margin: 1.25rem 0;
        padding: 1rem;
        border: 1px dashed #bbb;
        border-radius: 8px;
      }
      #status {
        margin-left: 0.5rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>File Manager</h1>
    <p class="hint">
      These files live in this plugin's private sandbox
      (<code>data/plugin-data/file-manager/</code>) via the
      <code>storage.fs</code> permission. They are server-side only and never
      served publicly.
    </p>

    <div class="uploader">
      <input type="file" id="file" />
      <button id="upload">Upload</button>
      <span id="status"></span>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th style="width: 12rem">Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="empty" style="display: none">
      No files yet. Upload one above.
    </div>

    <script>
      const statusEl = document.getElementById("status");

      function setStatus(msg, isError) {
        statusEl.textContent = msg || "";
        statusEl.style.color = isError ? "#b00020" : "#2e7d32";
      }

      async function refresh() {
        const res = await fetch("./api/files");
        const { files } = await res.json();
        const rows = document.getElementById("rows");
        rows.innerHTML = "";
        document.getElementById("empty").style.display = files.length
          ? "none"
          : "block";
        for (const name of files) {
          const tr = document.createElement("tr");

          const nameTd = document.createElement("td");
          nameTd.textContent = name;
          tr.appendChild(nameTd);

          const actionsTd = document.createElement("td");

          const dl = document.createElement("button");
          dl.textContent = "Download";
          dl.onclick = () => download(name);
          actionsTd.appendChild(dl);

          const del = document.createElement("button");
          del.textContent = "Delete";
          del.className = "danger";
          del.style.marginLeft = "0.5rem";
          del.onclick = () => remove(name);
          actionsTd.appendChild(del);

          tr.appendChild(actionsTd);
          rows.appendChild(tr);
        }
      }

      // Read the chosen file as a data URL ("data:<mime>;base64,XXXX") and
      // send just the base64 payload; the plugin decodes it back to bytes.
      function readAsBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result).split(",")[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      document.getElementById("upload").onclick = async () => {
        const input = document.getElementById("file");
        const file = input.files[0];
        if (!file) {
          setStatus("Choose a file first.", true);
          return;
        }
        setStatus("Uploading…");
        const dataBase64 = await readAsBase64(file);
        const res = await fetch("./api/files", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ name: file.name, dataBase64 }),
        });
        const body = await res.json();
        if (!res.ok || !body.ok) {
          setStatus(body.error || "Upload failed.", true);
          return;
        }
        setStatus(body.replaced ? "Replaced." : "Uploaded.");
        input.value = "";
        refresh();
      };

      async function remove(name) {
        if (!confirm(`Delete "${name}"?`)) return;
        const res = await fetch("./api/files/delete", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ name }),
        });
        const body = await res.json();
        if (!res.ok || !body.ok) {
          setStatus(body.error || "Delete failed.", true);
          return;
        }
        setStatus("Deleted.");
        refresh();
      }

      async function download(name) {
        const res = await fetch(
          "./api/files/download?name=" + encodeURIComponent(name),
        );
        if (!res.ok) {
          setStatus("Download failed.", true);
          return;
        }
        const { dataBase64 } = await res.json();
        // Turn the base64 back into a blob and let the browser save it.
        const bin = atob(dataBase64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const url = URL.createObjectURL(new Blob([bytes]));
        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        // Attach before clicking, and revoke on a delay — revoking the
        // object URL synchronously after click() cancels the download in
        // some browsers.
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 10000);
      }

      refresh();
    </script>
  </body>
</html>
